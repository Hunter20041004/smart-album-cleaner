# Streamlit 設定 — AI 表情相簿管家(淺色暖米 + 香檳金,與海報主視覺一致)

[theme]
base = "light"
primaryColor = "#a67632"
backgroundColor = "#faf6ea"
secondaryBackgroundColor = "#ffffff"
textColor = "#1c1814"
font = "sans serif"

[server]
headless = true
runOnSave = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showErrorDetails = true
